<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upgrade to Premium</title>
  <link rel="stylesheet" href="welcome.css">
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">
  <div class="login-shell" aria-hidden="true">
    <div class="login-orb login-orb-a"></div>
    <div class="login-orb login-orb-b"></div>
    <div class="login-grid"></div>
  </div>

  <main class="login-layout">
    <section class="login-brand-panel">
      <div class="login-copy">
        <p class="login-kicker">Premium Access</p>
        <h1>Unlock more with Premium</h1>
        <p class="login-lead">
          Get up to 10,000 monthly credits and priority access to cloud models.
        </p>
      </div>
    </section>

    <section class="login-card">
      <div class="login-card-copy">
        <h2>Upgrade your account</h2>
        <p>Would you like to pay for premium to unlock pro features?</p>
      </div>

      <div class="login-provider-row">
        <button type="button" class="login-provider-btn" id="btn-upgrade-yes" style="background: var(--cb-accent-primary); color: white;">
          <span>Yes, Upgrade</span>
        </button>
        <button type="button" class="login-provider-btn" id="btn-upgrade-no">
          <span>No, maybe later</span>
        </button>
      </div>
    </section>
  </main>
  <script src="upgrade.js"></script>
</body>
</html>
